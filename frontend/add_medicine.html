<!DOCTYPE html>
<html>
<head>
    <title>Add Medicine</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h2>Add Medicine</h2>

    <input type="text" id="medName" placeholder="Medicine Name" required>

    <input type="text" id="dosage" placeholder="Dosage" required>

    <select id="time">
        <option value="">Select Time</option>
        <option>Morning(before meal)</option>
        <option>Morning(after meal)</option>
        <option>Afternoon(before meal)</option>
        <option>Afternoon(after meal)</option>
        <option>Night(before meal)</option>
        <option>Night(after meal)</option>
    </select>

    <button onclick="addMedicine()">Add</button>

    <button onclick="location.href='dashboard.html'">Back</button>

    <p id="msg"></p>

</div>

<script>

    // Prevent access without login
    if(!localStorage.getItem("loggedIn")){
        window.location.href = "index.html";
    }

</script>

<script src="js/medicine.js"></script>

</body>
</html>
